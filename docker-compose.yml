version: '3'

services:
  node-app:
    build: .
    image: node-app
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/node-boilerplate
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/usr/src/node-app
      - /usr/src/node-app/node_modules # Anonymous volume: tránh node_modules máy host đè lên container
    networks:
      - node-network

  mongodb:
    container_name: mongodb-ci
    image: mongo:4.2.1-bionic
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - dbdata:/data/db
    networks:
      - node-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  dbdata:

networks:
  node-network:
    driver: bridge
